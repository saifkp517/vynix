version: "3.9"

services:
  app:
    build: .
    container_name: vynix-app
    ports:
      - "3000:3000" # REST
      - "4000:4000" # Socket
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: bun run start

  postgres:
    image: postgres:16-alpine
    container_name: vynix-postgres
    environment:
      POSTGRES_USER: vynix
      POSTGRES_PASSWORD: vynixpass
      POSTGRES_DB: vynixdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vynix-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:

